<div id="imageModal" class="image-modal">
  <button class="image-modal-close" type="button" aria-label="Close image">&times;</button>

  <button class="image-modal-arrow image-modal-prev" type="button" aria-label="Previous image">
    ‹
  </button>

  <div class="image-modal-slider">
    <div class="image-modal-track" id="modalImageTrack">
      <img id="modalPrevImage" src="" alt="Previous image">
      <img id="modalCurrentImage" src="" alt="Preview image">
      <img id="modalNextImage" src="" alt="Next image">
    </div>
  </div>

  <button class="image-modal-arrow image-modal-next" type="button" aria-label="Next image">
    ›
  </button>
</div>

<script>
  const imageModal = document.getElementById("imageModal");
  const imageModalClose = document.querySelector(".image-modal-close");
  const prevButton = document.querySelector(".image-modal-prev");
  const nextButton = document.querySelector(".image-modal-next");

  const modalImageTrack = document.getElementById("modalImageTrack");
  const modalPrevImage = document.getElementById("modalPrevImage");
  const modalCurrentImage = document.getElementById("modalCurrentImage");
  const modalNextImage = document.getElementById("modalNextImage");

  const allImages = Array.from(
    document.querySelectorAll(".gallery img, .gallery-grid img")
  );

  let currentImageIndex = 0;
  let touchStartX = 0;
  let touchEndX = 0;
  let isSliding = false;

  allImages.forEach(function (img, index) {
    img.classList.add("clickable-image");

    img.addEventListener("click", function () {
      currentImageIndex = index;
      openImageModal();
    });
  });

  function getPrevIndex() {
    return (currentImageIndex - 1 + allImages.length) % allImages.length;
  }

  function getNextIndex() {
    return (currentImageIndex + 1) % allImages.length;
  }

  function setModalImages() {
    if (allImages.length === 0) return;

    const prevImage = allImages[getPrevIndex()];
    const currentImage = allImages[currentImageIndex];
    const nextImage = allImages[getNextIndex()];

    modalPrevImage.src = prevImage.src;
    modalPrevImage.alt = prevImage.alt || "Previous image";

    modalCurrentImage.src = currentImage.src;
    modalCurrentImage.alt = currentImage.alt || "Preview image";

    modalNextImage.src = nextImage.src;
    modalNextImage.alt = nextImage.alt || "Next image";
  }

  function resetTrackPosition() {
    modalImageTrack.classList.add("no-transition");
    modalImageTrack.style.transform = "translateX(-33.3333%)";

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        modalImageTrack.classList.remove("no-transition");
      });
    });
  }

  function openImageModal() {
    if (allImages.length === 0) return;

    setModalImages();
    resetTrackPosition();

    imageModal.classList.add("show");
    document.body.style.overflow = "hidden";
  }

  function closeImageModal() {
    imageModal.classList.remove("show");
    document.body.style.overflow = "";
  }

  function slideToNextImage() {
    if (isSliding || allImages.length === 0) return;

    isSliding = true;

    modalImageTrack.style.transform = "translateX(-66.6666%)";

    setTimeout(function () {
      currentImageIndex = getNextIndex();

      setModalImages();
      resetTrackPosition();

      isSliding = false;
    }, 380);
  }

  function slideToPrevImage() {
    if (isSliding || allImages.length === 0) return;

    isSliding = true;

    modalImageTrack.style.transform = "translateX(0)";

    setTimeout(function () {
      currentImageIndex = getPrevIndex();

      setModalImages();
      resetTrackPosition();

      isSliding = false;
    }, 380);
  }

  imageModalClose.addEventListener("click", closeImageModal);
  prevButton.addEventListener("click", slideToPrevImage);
  nextButton.addEventListener("click", slideToNextImage);

  imageModal.addEventListener("click", function (event) {
    if (event.target === imageModal) {
      closeImageModal();
    }
  });

  document.addEventListener("keydown", function (event) {
    if (!imageModal.classList.contains("show")) return;

    if (event.key === "Escape") {
      closeImageModal();
    }

    if (event.key === "ArrowLeft") {
      slideToPrevImage();
    }

    if (event.key === "ArrowRight") {
      slideToNextImage();
    }
  });

  imageModal.addEventListener("touchstart", function (event) {
    touchStartX = event.changedTouches[0].screenX;
  });

  imageModal.addEventListener("touchend", function (event) {
    touchEndX = event.changedTouches[0].screenX;
    handleSwipe();
  });

  function handleSwipe() {
    const swipeDistance = touchEndX - touchStartX;

    if (Math.abs(swipeDistance) < 50) return;

    if (swipeDistance > 0) {
      slideToPrevImage();
    } else {
      slideToNextImage();
    }
  }
</script>
