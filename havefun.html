<div id="imageModal" class="image-modal">
  <button class="image-modal-close" type="button" aria-label="Close image">&times;</button>

  <button class="image-modal-arrow image-modal-prev" type="button" aria-label="Previous image">
    ‹
  </button>

  <div class="image-modal-slider" id="imageModalSlider">
    <div class="image-modal-track" id="modalImageTrack"></div>
  </div>

  <button class="image-modal-arrow image-modal-next" type="button" aria-label="Next image">
    ›
  </button>
</div>

<script>
  const imageModal = document.getElementById("imageModal");
  const imageModalClose = document.querySelector(".image-modal-close");
  const prevButton = document.querySelector(".image-modal-prev");
  const nextButton = document.querySelector(".image-modal-next");
  const modalImageTrack = document.getElementById("modalImageTrack");

  const allImages = Array.from(
    document.querySelectorAll(".gallery img, .gallery-grid img")
  );

  const imageList = allImages.map(function (img) {
    return {
      src: img.currentSrc || img.src,
      alt: img.alt || "Preview image"
    };
  });

  let currentImageIndex = 0;
  let touchStartX = 0;
  let touchCurrentX = 0;
  let isDragging = false;

  function renderModalImages() {
    modalImageTrack.innerHTML = "";

    imageList.forEach(function (item) {
      const slide = document.createElement("div");
      slide.className = "image-modal-slide";

      const image = document.createElement("img");
      image.src = item.src;
      image.alt = item.alt;

      slide.appendChild(image);
      modalImageTrack.appendChild(slide);
    });
  }

  function updateArrowState() {
    if (currentImageIndex === 0) {
      prevButton.classList.add("disabled");
    } else {
      prevButton.classList.remove("disabled");
    }

    if (currentImageIndex === imageList.length - 1) {
      nextButton.classList.add("disabled");
    } else {
      nextButton.classList.remove("disabled");
    }
  }

  function moveTrack(withTransition, offsetX) {
    const baseMove = -currentImageIndex * 100;
    const extraMove = offsetX || 0;

    if (withTransition) {
      modalImageTrack.style.transition =
        "transform 0.38s cubic-bezier(0.22, 0.61, 0.36, 1)";
    } else {
      modalImageTrack.style.transition = "none";
    }

    modalImageTrack.style.transform =
      "translate3d(calc(" + baseMove + "% + " + extraMove + "px), 0, 0)";
  }

  function openImageModal(index) {
    if (imageList.length === 0) return;

    currentImageIndex = index;

    if (modalImageTrack.children.length === 0) {
      renderModalImages();
    }

    imageModal.classList.add("show");
    document.body.style.overflow = "hidden";

    moveTrack(false, 0);
    updateArrowState();
  }

  function closeImageModal() {
    imageModal.classList.remove("show");
    document.body.style.overflow = "";
  }

  function showNextImage() {
    if (currentImageIndex >= imageList.length - 1) {
      moveTrack(true, 0);
      return;
    }

    currentImageIndex++;
    moveTrack(true, 0);
    updateArrowState();
  }

  function showPrevImage() {
    if (currentImageIndex <= 0) {
      moveTrack(true, 0);
      return;
    }

    currentImageIndex--;
    moveTrack(true, 0);
    updateArrowState();
  }

  allImages.forEach(function (img, index) {
    img.classList.add("clickable-image");

    img.addEventListener("click", function () {
      openImageModal(index);
    });
  });

  imageModalClose.addEventListener("click", closeImageModal);
  prevButton.addEventListener("click", showPrevImage);
  nextButton.addEventListener("click", showNextImage);

  imageModal.addEventListener("click", function (event) {
    if (event.target === imageModal) {
      closeImageModal();
    }
  });

  document.addEventListener("keydown", function (event) {
    if (!imageModal.classList.contains("show")) return;

    if (event.key === "Escape") {
      closeImageModal();
    }

    if (event.key === "ArrowLeft") {
      showPrevImage();
    }

    if (event.key === "ArrowRight") {
      showNextImage();
    }
  });

  imageModal.addEventListener("touchstart", function (event) {
    touchStartX = event.touches[0].clientX;
    touchCurrentX = touchStartX;
    isDragging = true;

    moveTrack(false, 0);
  });

  imageModal.addEventListener("touchmove", function (event) {
    if (!isDragging) return;

    touchCurrentX = event.touches[0].clientX;
    let offsetX = touchCurrentX - touchStartX;

    if (currentImageIndex === 0 && offsetX > 0) {
      offsetX = offsetX * 0.25;
    }

    if (currentImageIndex === imageList.length - 1 && offsetX < 0) {
      offsetX = offsetX * 0.25;
    }

    moveTrack(false, offsetX);
    event.preventDefault();
  }, { passive: false });

  imageModal.addEventListener("touchend", function () {
    if (!isDragging) return;

    isDragging = false;

    const swipeDistance = touchCurrentX - touchStartX;

    if (swipeDistance < -60) {
      showNextImage();
    } else if (swipeDistance > 60) {
      showPrevImage();
    } else {
      moveTrack(true, 0);
    }
  });
</script>
